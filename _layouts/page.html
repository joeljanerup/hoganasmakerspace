<html lang="{{ site.lang | default: "sv" }}">

{% include head.html %}

<body>
    <script type="text/javascript">document.body.classList.add("is-loading");</script>

    {% include header.html %} {{ content }}
    
    <!-- Contact Section -->
    <section id="contact">
        <div class="inner">
            <section>
                <div class="fields">
                    <div class="field">
                        <label>Adress</label>
                        <p>
                            <strong>{{ site.title }}</strong><br />
                            {{ site.street_address }}<br />
                            {{ site.zip_code }} {{ site.city }}
                        </p>
                    </div>
                </div>
            </section>
            <section>
                <div class="fields">
                    <div class="field">
                        <label>Öppettider</label>
                        {% include opening-hours.html %}
                    </div>
                </div>
            </section>
        </div>
    </section>
    
    {% include footer.html %}

</body>

</html>
